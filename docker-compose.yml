services:
  app:
    build: .
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testing
      POSTGRES_USER: testing
      POSTGRES_PASSWORD: testing
    ports:
      - "5432:5432"
